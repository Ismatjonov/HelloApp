<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>METANIT.COM</title>
</head>
<body>
    <h2>User form</h2>
    <form method="post" action="postuser">
        <p>Name: <br>
            <input type="text" name="name">
        </p>
        <p>Age: <br>
            <input type="number" name="age">
        </p>
        <p>
            Languages: <br>
            <select multiple name="languages">
                <option>C#</option>
                <option>JavaScript</option>
                <option>Kotlin</option>
                <option>Java</option>
            </select>
        </p>
        <button>Send</button>
    </form>
</body>
</html>
